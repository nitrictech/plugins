name: neon-db
type: database
description: "serverless PostgreSQL with instant branching, auto scaling, and built-in connection pooling"
icon: ./icon.svg
required_identities: []
deployment:
  terraform: ./module
inputs:
  project_id:
    type: string
    description: "Neon project ID"
    example: "misty-wind-123456"
  branch_id:
    type: string
    description: "Neon branch ID for the database"
    example: "br-cool-sunset-123456"

outputs:
  connection_string:
    type: string
    description: "PostgreSQL connection URI (scheme postgresql:// or postgres://)"
    example: "postgresql://USER:PASSWORD@HOST:PORT/DB?sslmode=require"
