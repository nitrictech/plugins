name: gcp-cloudrun
display_name: Cloud Run
type: service
description: "Run stateless containers with automatic scaling from zero"
icon: ./icon.svg
required_identities:
  - gcp:iam:service_account
deployment:
  # NOTE: // is required to reference a sub-path of repository for terraform modules
  terraform: ./module
runtime:
  go_module: github.com/nitrictech/plugins/gcp/cloudrun

inputs:
  environment:
    type: map(string)
    description: "Environment variables for the Cloud Run service"
    example: '{"NODE_ENV": "production", "LOG_LEVEL": "info"}'
  memory_mb:
    type: number
    description: "Amount of memory to allocate to the Cloud Run service in MB"
    example: 512
  cpus:
    type: number
    description: "Number of CPUs to allocate to the Cloud Run service"
    example: 1
  gpus:
    type: number
    description: "Number of GPUs to allocate to the Cloud Run service"
    example: 0
  min_instances:
    type: number
    description: "Minimum number of instances to keep running"
    example: 0
  max_instances:
    type: number
    description: "Maximum number of instances that can be created"
    example: 10
  container_concurrency:
    type: number
    description: "Maximum number of concurrent requests each instance can handle"
    example: 80
  timeout_seconds:
    type: number
    description: "Maximum request timeout in seconds"
    example: 10
  project_id:
    type: string
    description: "Google Cloud Project ID"
    example: "my-project-123"
  region:
    type: string
    description: "Google Cloud region to deploy the service"
    example: "us-central1"
  container_port:
    type: number
    description: "Port number the container exposes"
    example: 9001

outputs:
