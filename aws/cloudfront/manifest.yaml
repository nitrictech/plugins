name: aws-cloudfront
display_name: CloudFront
type: entrypoint
description: "Content Delivery Network for fast, global content delivery"
icon: ./icon.svg
deployment:
  terraform: ./module

inputs:
  custom_domain:
    type: string
    description: "Custom domain name for CloudFront distribution"
    example: "cdn.example.com"
  custom_domain_is_root:
    type: bool
    description: "Indicates if the custom domain is the root domain for the purposes of hosted zone lookup and record creation"
    example: false
  waf_enabled:
    type: bool
    description: "Enable AWS WAF for CloudFront distribution"
    example: false
  waf_managed_rules:
    type: list(object)
    description: "List of AWS Managed Rule Groups to enable"
    example: '[{"name": "AWSManagedRulesCommonRuleSet", "priority": 10, "override_action": "none"}, {"name": "AWSManagedRulesKnownBadInputsRuleSet", "priority": 20, "override_action": "none"}]'
  geo_restriction_type:
    type: string
    description: "Type of geo restriction (none, whitelist, blacklist)"
    example: "none"
  geo_restriction_locations:
    type: list(string)
    description: "List of ISO 3166-1 alpha-2 country codes for geo restriction"
    example: '["US", "CA", "GB"]'
  rate_limit_enabled:
    type: bool
    description: "Enable rate limiting rules for DDoS protection"
    example: true
  rate_limit_requests_per_5min:
    type: number
    description: "Maximum requests per 5-minute period per IP"
    example: 2000
  default_cache_policy_id:
    type: string
    nullable: true
    example: "658327ea-f89d-4fab-a63d-7e88639e58f6"
  default_origin_request_policy_id:
    type: string
    description: "Default origin request policy"
    example: "b689b0a8-53d0-40ab-baf2-68738e2966ac"

outputs: {}
