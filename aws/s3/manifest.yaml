name: aws-s3-bucket
type: storage
description: "Object storage for storing and retrieving data from anywhere"
icon: ./icon.svg
required_identities:
  - aws:iam:role
deployment:
  terraform: ./module
runtime:
  go_module: github.com/nitrictech/plugins/aws/s3

inputs:
  tags:
    type: map(string)
    description: "Tags to apply to the S3 bucket"
    example: '{"Environment": "production", "Purpose": "media-storage"}'

outputs: {}
